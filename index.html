<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn to Die - Web Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Roboto+Condensed:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
            color: #fff;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #gameCanvas {
            flex: 1;
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #1a0f0a 50%, #0f0500 100%);
            touch-action: none;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .hud {
            position: absolute;
            background: rgba(0,0,0,0.85);
            border: 2px solid #ff6b35;
            border-radius: 12px;
            padding: 12px;
            font-family: 'Russo One', sans-serif;
            backdrop-filter: blur(5px);
        }
        
        #stats {
            top: 10px;
            left: 10px;
            min-width: 180px;
            font-size: 14px;
        }
        
        #stats div {
            margin: 4px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .stat-label {
            color: #ff6b35;
        }
        
        #fuelBar {
            width: 100%;
            height: 16px;
            background: #333;
            border: 2px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        #fuelFill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000 0%, #ffff00 50%, #00ff00 100%);
            transition: width 0.3s;
            width: 100%;
            box-shadow: 0 0 10px rgba(0,255,0,0.5);
        }
        
        #controls {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: auto;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 20px;
        }
        
        .control-btn {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #ff6b35, #d84315);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 6px 0 #bf360c, 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: manipulation;
        }
        
        .control-btn:active, .control-btn.active {
            transform: translateY(6px) scale(0.95);
            box-shadow: 0 0 0 #bf360c, 0 4px 10px rgba(0,0,0,0.5);
            background: linear-gradient(145deg, #ff5722, #bf360c);
        }
        
        .control-btn:disabled {
            background: #444;
            box-shadow: 0 6px 0 #222;
        }
        
        #menu, #shop, #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .hidden {
            display: none !important;
        }
        
        h1 {
            font-family: 'Russo One', sans-serif;
            font-size: 48px;
            color: #ff6b35;
            text-shadow: 3px 3px 0 #8b0000, 6px 6px 0 #000;
            margin-bottom: 20px;
            text-align: center;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .btn {
            padding: 18px 50px;
            font-size: 24px;
            font-family: 'Russo One', sans-serif;
            background: linear-gradient(145deg, #ff6b35, #d84315);
            border: 3px solid #fff;
            color: white;
            cursor: pointer;
            margin: 10px;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #bf360c, 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 10px;
            min-width: 250px;
            text-align: center;
        }
        
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #bf360c;
        }
        
        #shop {
            justify-content: flex-start;
            padding: 20px;
            padding-top: 60px;
        }
        
        #shop h2 {
            font-family: 'Russo One', sans-serif;
            font-size: 36px;
            color: #ff6b35;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.9);
            width: 100%;
            text-align: center;
            padding: 10px;
            z-index: 10;
        }
        
        #money {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            position: sticky;
            top: 60px;
            background: rgba(0,0,0,0.9);
            width: 100%;
            text-align: center;
            padding: 10px;
            z-index: 10;
        }
        
        .upgrade-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 100px;
        }
        
        .upgrade-item {
            background: linear-gradient(145deg, rgba(255,107,53,0.1), rgba(0,0,0,0.5));
            border: 2px solid #ff6b35;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
        }
        
        .upgrade-item:active {
            transform: scale(0.98);
            background: rgba(255,107,53,0.3);
        }
        
        .upgrade-item.maxed {
            border-color: #ffd700;
            background: linear-gradient(145deg, rgba(255,215,0,0.2), rgba(0,0,0,0.5));
        }
        
        .upgrade-item.disabled {
            opacity: 0.5;
            border-color: #666;
        }
        
        .upgrade-name {
            font-family: 'Russo One', sans-serif;
            font-size: 22px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .upgrade-level {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 8px;
        }
        
        .upgrade-cost {
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .upgrade-desc {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
        }
        
        #distanceMarker {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ff6b35;
            font-size: 14px;
        }
        
        .marker {
            margin: 8px 0;
            opacity: 0.4;
            transition: all 0.3s;
        }
        
        .marker.reached {
            color: #00ff00;
            opacity: 1;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff00;
        }
        
        #gameOver h1 {
            font-size: 32px;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 10px;
            text-align: center;
            min-width: 200px;
        }
        
        .stat-box .label {
            color: #aaa;
            font-size: 18px;
        }
        
        .stat-box .value {
            color: #fff;
            font-size: 32px;
            font-family: 'Russo One', sans-serif;
            margin-top: 10px;
        }
        
        .money-value {
            color: #ffd700 !important;
        }
        
        @media (max-width: 380px) {
            h1 { font-size: 36px; }
            .control-btn { width: 60px; height: 60px; font-size: 24px; }
            #stats { font-size: 12px; min-width: 150px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div id="stats" class="hud">
                <div>🏁 <span class="stat-label">Дистанция:</span> <span id="distance">0</span> м</div>
                <div>⚡ <span class="stat-label">Скорость:</span> <span id="speed">0</span> км/ч</div>
                <div>💰 <span class="stat-label">Деньги:</span> $<span id="cash">0</span></div>
                <div>⛽ Топливо:</div>
                <div id="fuelBar">
                    <div id="fuelFill"></div>
                </div>
            </div>
            
            <div id="distanceMarker" class="hud">
                <div class="marker" data-dist="500">🏁 500м</div>
                <div class="marker" data-dist="1000">🏁 1000м</div>
                <div class="marker" data-dist="2000">🏁 2000м</div>
                <div class="marker" data-dist="4000">🏁 4000м</div>
                <div class="marker" data-dist="8000">🏁 8000м</div>
            </div>
            
            <div id="controls">
                <div class="control-btn" id="gasBtn">⛽</div>
                <div class="control-btn" id="brakeBtn">🛑</div>
                <div class="control-btn" id="boostBtn">🚀</div>
            </div>
        </div>
        
        <div id="menu">
            <h1>🏎️ EARN TO DIE 💀</h1>
            <p style="font-size: 18px; margin-bottom: 25px; text-align: center; max-width: 90%; color: #aaa; line-height: 1.5;">
                Проеди как можно дальше!<br>
                Сбивай зомби, прокачивай тачку!<br>
                <span style="color: #ff6b35; font-size: 14px;">Кнопки: ⛽ газ | 🛑 тормоз | 🚀 буст</span>
            </p>
            <button class="btn" onclick="game.start()">ИГРАТЬ</button>
        </div>
        
        <div id="shop" class="hidden">
            <h2>🔧 ГАРАЖ 🔧</h2>
            <div id="money">💰 $<span id="shopMoney">0</span></div>
            <div class="upgrade-grid" id="upgradeGrid">
                <!-- Upgrades generated by JS -->
            </div>
            <button class="btn" onclick="game.nextLevel()" style="position: sticky; bottom: 20px; margin-top: 20px;">ПРОДОЛЖИТЬ ➔</button>
        </div>
        
        <div id="gameOver" class="hidden">
            <h1>⛽ ТОПЛИВО ЗАКОНЧИЛОСЬ!</h1>
            <div class="stat-box">
                <div class="label">Пройдено</div>
                <div class="value" id="finalDistance">0 м</div>
            </div>
            <div class="stat-box">
                <div class="label">Заработано</div>
                <div class="value money-value" id="finalCash">$0</div>
            </div>
            <button class="btn" onclick="game.openShop()">В ГАРАЖ 🔧</button>
        </div>
    </div>

    <script>
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                this.gas = false;
                this.brake = false;
                this.boost = false;
                
                this.setupTouchControls();
                this.reset();
                this.generateUpgradesUI();
                this.loop();
            }
            
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }
            
            setupTouchControls() {
                const gasBtn = document.getElementById('gasBtn');
                const brakeBtn = document.getElementById('brakeBtn');
                const boostBtn = document.getElementById('boostBtn');
                
                // Gas button
                const startGas = (e) => { 
                    e.preventDefault(); 
                    this.gas = true; 
                    gasBtn.classList.add('active');
                };
                const endGas = (e) => { 
                    e.preventDefault(); 
                    this.gas = false; 
                    gasBtn.classList.remove('active');
                };
                
                gasBtn.addEventListener('touchstart', startGas, {passive: false});
                gasBtn.addEventListener('touchend', endGas);
                gasBtn.addEventListener('mousedown', startGas);
                gasBtn.addEventListener('mouseup', endGas);
                gasBtn.addEventListener('mouseleave', endGas);
                
                // Brake button
                const startBrake = (e) => { 
                    e.preventDefault(); 
                    this.brake = true; 
                    brakeBtn.classList.add('active');
                };
                const endBrake = (e) => { 
                    e.preventDefault(); 
                    this.brake = false; 
                    brakeBtn.classList.remove('active');
                };
                
                brakeBtn.addEventListener('touchstart', startBrake, {passive: false});
                brakeBtn.addEventListener('touchend', endBrake);
                brakeBtn.addEventListener('mousedown', startBrake);
                brakeBtn.addEventListener('mouseup', endBrake);
                brakeBtn.addEventListener('mouseleave', endBrake);
                
                // Boost button
                const startBoost = (e) => { 
                    e.preventDefault(); 
                    this.boost = true; 
                    boostBtn.classList.add('active');
                };
                const endBoost = (e) => { 
                    e.preventDefault(); 
                    this.boost = false; 
                    boostBtn.classList.remove('active');
                };
                
                boostBtn.addEventListener('touchstart', startBoost, {passive: false});
                boostBtn.addEventListener('touchend', endBoost);
                boostBtn.addEventListener('mousedown', startBoost);
                boostBtn.addEventListener('mouseup', endBoost);
                boostBtn.addEventListener('mouseleave', endBoost);
                
                // Prevent default touch behaviors
                document.addEventListener('touchmove', (e) => {
                    if(e.target.closest('.control-btn')) {
                        e.preventDefault();
                    }
                }, {passive: false});
            }
            
            reset() {
                this.car = {
                    x: 100,
                    y: 0,
                    vx: 0,
                    vy: 0,
                    angle: 0,
                    angularVel: 0,
                    fuel: 100,
                    maxFuel: 100,
                    onGround: false,
                    health: 100
                };
                
                this.camera = { x: 0, y: 0 };
                this.distance = 0;
                this.maxDistance = 0;
                this.cash = 0;
                this.totalCash = 0;
                this.zombies = [];
                this.obstacles = [];
                this.particles = [];
                this.ground = [];
                this.level = 1;
                
                this.upgrades = {
                    engine: 1,
                    transmission: 1,
                    wheels: 1,
                    fuel: 1,
                    armor: 1,
                    weapon: 0
                };
                
                this.costs = {
                    engine: 100,
                    transmission: 150,
                    wheels: 80,
                    fuel: 120,
                    armor: 200,
                    weapon: 500
                };
                
                this.upgradeInfo = {
                    engine: { icon: '🔥', name: 'Двигатель', desc: 'Максимальная скорость' },
                    transmission: { icon: '⚙️', name: 'Трансмиссия', desc: 'Ускорение и разгон' },
                    wheels: { icon: '🛞', name: 'Колёса', desc: 'Сцепление с дорогой' },
                    fuel: { icon: '⛽', name: 'Бак', desc: 'Запас топлива' },
                    armor: { icon: '🛡️', name: 'Броня', desc: 'Защита от урона' },
                    weapon: { icon: '🔫', name: 'Пушка', desc: 'Авто-атака зомби' }
                };
                
                this.generateGround();
            }
            
            generateGround() {
                this.ground = [];
                let y = this.canvas.height * 0.65;
                for(let x = 0; x < 20000; x += 10) {
                    // Smoother terrain
                    const noise = Math.sin(x * 0.005) * 30 + Math.sin(x * 0.02) * 10 + Math.random() * 5;
                    y = this.canvas.height * 0.65 + noise;
                    this.ground.push({x, y});
                }
            }
            
            generateUpgradesUI() {
                const grid = document.getElementById('upgradeGrid');
                grid.innerHTML = '';
                
                Object.keys(this.upgradeInfo).forEach(key => {
                    const info = this.upgradeInfo[key];
                    const div = document.createElement('div');
                    div.className = 'upgrade-item';
                    div.id = `upgrade-${key}`;
                    div.innerHTML = `
                        <div class="upgrade-name">${info.icon} ${info.name}</div>
                        <div class="upgrade-level">Уровень <span id="level-${key}">1</span>/<span id="max-${key}">${key === 'weapon' ? 3 : 5}</span></div>
                        <div class="upgrade-cost" id="cost-${key}">$${this.costs[key]}</div>
                        <div class="upgrade-desc">${info.desc}</div>
                    `;
                    div.onclick = () => this.buyUpgrade(key);
                    grid.appendChild(div);
                });
            }
            
            start() {
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('shop').classList.add('hidden');
                document.getElementById('gameOver').classList.add('hidden');
                this.resetLevel();
            }
            
            resetLevel() {
                const fuelBonus = (this.upgrades.fuel - 1) * 25;
                this.car.maxFuel = 100 + fuelBonus;
                
                this.car.x = 100;
                this.car.y = this.getGroundY(100) - 50;
                this.car.vx = 0;
                this.car.vy = 0;
                this.car.angle = 0;
                this.car.angularVel = 0;
                this.car.fuel = this.car.maxFuel;
                this.car.health = 100 + (this.upgrades.armor - 1) * 20;
                this.distance = 0;
                this.cash = 0;
                this.zombies = [];
                this.obstacles = [];
                this.particles = [];
                this.generateLevel();
            }
            
            generateLevel() {
                // Generate zombies with better distribution
                for(let i = 600; i < 15000; i += 150 + Math.random() * 250) {
                    this.zombies.push({
                        x: i,
                        y: this.getGroundY(i) - 25,
                        vx: -0.3 - Math.random() * 0.5,
                        health: 1,
                        dead: false,
                        animOffset: Math.random() * Math.PI * 2
                    });
                }
                
                // Generate obstacles
                for(let i = 1000; i < 15000; i += 300 + Math.random() * 500) {
                    const type = Math.random();
                    if(type < 0.25) {
                        // Crate
                        this.obstacles.push({
                            x: i,
                            y: this.getGroundY(i) - 35,
                            w: 35,
                            h: 35,
                            type: 'crate'
                        });
                    } else if(type < 0.5) {
                        // Ramp
                        this.obstacles.push({
                            x: i,
                            y: this.getGroundY(i),
                            w: 80,
                            h: 50,
                            type: 'ramp',
                            angle: -0.4
                        });
                    } else if(type < 0.75) {
                        // Barrier
                        this.obstacles.push({
                            x: i,
                            y: this.getGroundY(i) - 25,
                            w: 20,
                            h: 50,
                            type: 'barrier'
                        });
                    } else {
                        // Fuel canister (bonus!)
                        this.obstacles.push({
                            x: i,
                            y: this.getGroundY(i) - 40,
                            w: 25,
                            h: 35,
                            type: 'fuel',
                            collected: false
                        });
                    }
                }
            }
            
            getGroundY(x) {
                const idx = Math.floor(x / 10);
                if(idx < 0) return this.ground[0]?.y || this.canvas.height * 0.65;
                if(idx >= this.ground.length) return this.ground[this.ground.length - 1]?.y || this.canvas.height * 0.65;
                return this.ground[idx].y;
            }
            
            update() {
                if(!document.getElementById('menu').classList.contains('hidden') ||
                   !document.getElementById('shop').classList.contains('hidden') ||
                   !document.getElementById('gameOver').classList.contains('hidden')) {
                    return;
                }
                
                // Car physics
                const enginePower = 0.25 + (this.upgrades.engine - 1) * 0.12;
                const maxSpeed = 12 + (this.upgrades.engine - 1) * 4;
                const grip = 0.85 + (this.upgrades.wheels - 1) * 0.08;
                const fuelConsumption = 0.03 - (this.upgrades.fuel - 1) * 0.003;
                
                // Gas
                if(this.gas && this.car.fuel > 0) {
                    const boost = this.boost ? 1.6 : 1;
                    const angle = this.car.angle;
                    this.car.vx += enginePower * boost * Math.cos(angle);
                    this.car.vy += enginePower * boost * Math.sin(angle);
                    this.car.fuel -= fuelConsumption * (this.boost ? 2.5 : 1);
                    
                    // Exhaust particles
                    if(Math.random() < 0.4) {
                        this.addParticle(
                            this.car.x - 25 * Math.cos(angle),
                            this.car.y - 25 * Math.sin(angle),
                            'smoke'
                        );
                    }
                }
                
                // Brake
                if(this.brake) {
                    this.car.vx *= 0.92;
                    this.car.vy *= 0.92;
                }
                
                // Gravity
                this.car.vy += 0.6;
                
                const groundY = this.getGroundY(this.car.x);
                const groundAngle = Math.atan2(
                    this.getGroundY(this.car.x + 15) - this.getGroundY(this.car.x - 15),
                    30
                );
                
                // Ground collision
                if(this.car.y > groundY - 20) {
                    this.car.y = groundY - 20;
                    this.car.vy = Math.min(this.car.vy, 0);
                    this.car.onGround = true;
                    
                    // Friction
                    this.car.vx *= grip;
                    
                    // Align to ground
                    const targetAngle = groundAngle * 0.15;
                    this.car.angle += (targetAngle - this.car.angle) * 0.1;
                } else {
                    this.car.onGround = false;
                    this.car.angle += this.car.vy * 0.002;
                }
                
                // Update position
                this.car.x += this.car.vx;
                this.car.y += this.car.vy;
                
                // Speed limit
                const speed = Math.sqrt(this.car.vx**2 + this.car.vy**2);
                if(speed > maxSpeed) {
                    this.car.vx = (this.car.vx / speed) * maxSpeed;
                    this.car.vy = (this.car.vy / speed) * maxSpeed;
                }
                
                // Update distance
                this.distance = Math.max(this.distance, Math.floor(this.car.x - 100));
                if(this.distance > this.maxDistance) {
                    this.maxDistance = this.distance;
                }
                
                // Camera follow with smoothing
                const targetCamX = this.car.x - this.canvas.width * 0.3;
                const targetCamY = this.car.y - this.canvas.height * 0.6;
                this.camera.x += (targetCamX - this.camera.x) * 0.1;
                this.camera.y += (targetCamY - this.camera.y) * 0.1;
                
                // Update zombies
                this.zombies.forEach((zombie, idx) => {
                    if(zombie.dead) {
                        zombie.y += zombie.vy;
                        zombie.vy += 0.5;
                        return;
                    }
                    
                    // Animate zombie
                    zombie.animOffset += 0.1;
                    zombie.x += zombie.vx + Math.sin(zombie.animOffset) * 0.5;
                    
                    const dx = this.car.x - zombie.x;
                    const dy = this.car.y - zombie.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if(dist < 45 && speed > 3) {
                        // Kill zombie
                        zombie.dead = true;
                        zombie.vx = this.car.vx * 0.3 + (Math.random() - 0.5) * 5;
                        zombie.vy = -8 - Math.random() * 5;
                        const reward = 10 + Math.floor(speed);
                        this.cash += reward;
                        
                        // Blood particles
                        for(let i = 0; i < 8; i++) {
                            this.addParticle(zombie.x, zombie.y, 'blood');
                        }
                        
                        // Screen shake
                        this.camera.x += (Math.random() - 0.5) * 15;
                        this.camera.y += (Math.random() - 0.5) * 15;
                    } else if(dist < 35 && speed <= 3) {
                        // Zombie stops car
                        this.car.vx *= 0.85;
                        this.car.health -= 1;
                        
                        // Push zombie
                        zombie.x -= 2;
                    }
                    
                    // Weapon auto-attack
                    if(this.upgrades.weapon > 0 && dist < 100 + this.upgrades.weapon * 80 && !zombie.dead) {
                        if(Math.random() < 0.08 * this.upgrades.weapon) {
                            zombie.health -= 1;
                            this.addParticle(zombie.x, zombie.y - 20, 'spark');
                            if(zombie.health <= 0) {
                                zombie.dead = true;
                                zombie.vx = (Math.random() - 0.5) * 10;
                                zombie.vy = -5;
                                this.cash += 15;
                                for(let i = 0; i < 5; i++) {
                                    this.addParticle(zombie.x, zombie.y, 'blood');
                                }
                            }
                        }
                    }
                });
                
                // Update obstacles
                this.obstacles.forEach(obs => {
                    const dx = this.car.x - obs.x;
                    const dy = this.car.y - obs.y;
                    
                    if(Math.abs(dx) < obs.w/2 + 25 && Math.abs(dy) < obs.h/2 + 25) {
                        if(obs.type === 'crate') {
                            this.car.vx *= 0.75;
                            obs.hit = true;
                            obs.x += this.car.vx * 0.3;
                            this.addParticle(obs.x, obs.y, 'wood');
                        } else if(obs.type === 'ramp') {
                            this.car.vy = -12;
                            this.car.vx += 3;
                            this.car.angle = -0.3;
                        } else if(obs.type === 'barrier') {
                            this.car.vx *= 0.6;
                            this.car.health -= 0.5;
                            this.addParticle(obs.x, obs.y, 'spark');
                        } else if(obs.type === 'fuel' && !obs.collected) {
                            obs.collected = true;
                            this.car.fuel = Math.min(this.car.fuel + 30, this.car.maxFuel);
                            this.addParticle(obs.x, obs.y, 'fuel');
                        }
                    }
                });
                
                // Update particles
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.3;
                    p.life--;
                    p.vx *= 0.98;
                    return p.life > 0;
                });
                
                // Check fuel
                if(this.car.fuel <= 0 && Math.abs(this.car.vx) < 0.5) {
                    this.gameOver();
                }
                
                // Check health
                if(this.car.health <= 0) {
                    this.gameOver();
                }
                
                this.updateUI();
            }
            
            addParticle(x, y, type) {
                const colors = {
                    blood: ['#8B0000', '#FF0000', '#4a0000'],
                    smoke: ['#666', '#888', '#444'],
                    spark: ['#FFD700', '#FFA500', '#FF6347'],
                    wood: ['#8B4513', '#A0522D', '#654321'],
                    fuel: ['#00FF00', '#32CD32', '#7CFC00']
                };
                
                const count = type === 'blood' ? 6 : 4;
                for(let i = 0; i < count; i++) {
                    const color = colors[type][Math.floor(Math.random() * colors[type].length)];
                    this.particles.push({
                        x: x + (Math.random() - 0.5) * 20,
                        y: y + (Math.random() - 0.5) * 20,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8 - 3,
                        life: 40 + Math.random() * 30,
                        color: color,
                        size: 3 + Math.random() * 4
                    });
                }
            }
            
            draw() {
                // Sky gradient
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                gradient.addColorStop(0, '#1a1a2e');
                gradient.addColorStop(0.5, '#16213e');
                gradient.addColorStop(0.5, '#1a0f0a');
                gradient.addColorStop(1, '#0f0500');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Sun/Moon
                this.ctx.fillStyle = 'rgba(255, 200, 100, 0.8)';
                this.ctx.beginPath();
                this.ctx.arc(this.canvas.width - 100, 100, 40, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.save();
                this.ctx.translate(-this.camera.x, -this.camera.y);
                
                // Draw ground with texture
                this.ctx.beginPath();
                this.ctx.moveTo(this.camera.x, this.canvas.height + this.camera.y);
                for(let i = 0; i < this.ground.length - 1; i++) {
                    this.ctx.lineTo(this.ground[i].x, this.ground[i].y);
                }
                this.ctx.lineTo(this.camera.x + this.canvas.width, this.canvas.height + this.camera.y);
                this.ctx.closePath();
                
                const groundGrad = this.ctx.createLinearGradient(0, this.canvas.height * 0.5, 0, this.canvas.height);
                groundGrad.addColorStop(0, '#3d2817');
                groundGrad.addColorStop(1, '#1a0f08');
                this.ctx.fillStyle = groundGrad;
                this.ctx.fill();
                
                // Grass
                this.ctx.fillStyle = '#2d5016';
                this.ctx.beginPath();
                for(let i = 0; i < this.ground.length - 1; i++) {
                    this.ctx.lineTo(this.ground[i].x, this.ground[i].y);
                }
                for(let i = this.ground.length - 1; i >= 0; i--) {
                    this.ctx.lineTo(this.ground[i].x, this.ground[i].y - 8);
                }
                this.ctx.closePath();
                this.ctx.fill();
                
                // Draw obstacles
                this.obstacles.forEach(obs => {
                    if(obs.type === 'crate') {
                        this.ctx.fillStyle = obs.hit ? '#5a3a1a' : '#8B4513';
                        this.ctx.fillRect(obs.x - obs.w/2, obs.y - obs.h, obs.w, obs.h);
                        // Wood texture
                        this.ctx.strokeStyle = '#654321';
                        this.ctx.lineWidth = 2;
                        this.ctx.strokeRect(obs.x - obs.w/2, obs.y - obs.h, obs.w, obs.h);
                    } else if(obs.type === 'ramp') {
                        this.ctx.save();
                        this.ctx.translate(obs.x, obs.y);
                        this.ctx.rotate(obs.angle);
                        this.ctx.fillStyle = '#666';
                        this.ctx.fillRect(-obs.w/2, -obs.h, obs.w, obs.h);
                        this.ctx.fillStyle = '#888';
                        this.ctx.fillRect(-obs.w/2, -obs.h, obs.w, 5);
                        this.ctx.restore();
                    } else if(obs.type === 'barrier') {
                        this.ctx.fillStyle = '#444';
                        this.ctx.fillRect(obs.x - obs.w/2, obs.y - obs.h, obs.w, obs.h);
                        this.ctx.fillStyle = '#ff6b35';
                        this.ctx.fillRect(obs.x - obs.w/2, obs.y - obs.h, obs.w, 5);
                        this.ctx.fillRect(obs.x - obs.w/2, obs.y - 5, obs.w, 5);
                    } else if(obs.type === 'fuel' && !obs.collected) {
                        this.ctx.fillStyle = '#228B22';
                        this.ctx.fillRect(obs.x - obs.w/2, obs.y - obs.h, obs.w, obs.h);
                        this.ctx.fillStyle = '#32CD32';
                        this.ctx.font = '20px Arial';
                        this.ctx.fillText('⛽', obs.x - 10, obs.y - 10);
                    }
                });
                
                // Draw zombies
                this.zombies.forEach(zombie => {
                    this.drawZombie(zombie);
                });
                
                // Draw car
                this.drawCar();
                
                // Draw particles
                this.particles.forEach(p => {
                    this.ctx.globalAlpha = p.life / 60;
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1;
                
                this.ctx.restore();
            }
            
            drawZombie(zombie) {
                const x = zombie.x;
                const y = zombie.y;
                
                if(zombie.dead) {
                    // Dead zombie (lying down)
                    this.ctx.save();
                    this.ctx.translate(x, y);
                    this.ctx.rotate(Math.PI / 2);
                    
                    // Body
                    this.ctx.fillStyle = '#2d5a3d';
                    this.ctx.fillRect(-15, -10, 30, 20);
                    // Head
                    this.ctx.fillStyle = '#4a7c59';
                    this.ctx.beginPath();
                    this.ctx.arc(0, -20, 10, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.restore();
                } else {
                    // Walking animation
                    const walkOffset = Math.sin(zombie.animOffset) * 3;
                    
                    // Shadow
                    this.ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    this.ctx.beginPath();
                    this.ctx.ellipse(x, y, 12, 4, 0, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // Legs
                    this.ctx.fillStyle = '#1a3d2a';
                    this.ctx.fillRect(x - 8 + walkOffset, y - 15, 4, 15);
                    this.ctx.fillRect(x + 4 - walkOffset, y - 15, 4, 15);
                    
                    // Body
                    this.ctx.fillStyle = '#2d5a3d';
                    this.ctx.fillRect(x - 10, y - 35, 20, 22);
                    
                    // Arms
                    this.ctx.fillStyle = '#2d5a3d';
                    this.ctx.fillRect(x - 14, y - 30, 4, 18);
                    this.ctx.fillRect(x + 10, y - 30, 4, 18);
                    
                    // Head
                    this.ctx.fillStyle = '#4a7c59';
                    this.ctx.beginPath();
                    this.ctx.arc(x, y - 40, 11, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // Eyes (glowing red)
                    this.ctx.fillStyle = '#ff0000';
                    this.ctx.shadowColor = '#ff0000';
                    this.ctx.shadowBlur = 5;
                    this.ctx.beginPath();
                    this.ctx.arc(x - 4, y - 42, 3, 0, Math.PI * 2);
                    this.ctx.arc(x + 4, y - 42, 3, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                    
                    // Mouth
                    this.ctx.fillStyle = '#000';
                    this.ctx.beginPath();
                    this.ctx.arc(x, y - 36, 4, 0, Math.PI);
                    this.ctx.fill();
                }
            }
            
            drawCar() {
                this.ctx.save();
                this.ctx.translate(this.car.x, this.car.y);
                this.ctx.rotate(this.car.angle);
                
                // Shadow
                this.ctx.fillStyle = 'rgba(0,0,0,0.4)';
                this.ctx.beginPath();
                this.ctx.ellipse(0, 15, 35, 10, 0, 0, Math.PI * 2);
                this.ctx.fill();
                
                // Car body with gradient
                const bodyGrad = this.ctx.createLinearGradient(-30, -20, 30, 20);
                bodyGrad.addColorStop(0, '#ff8c42');
                bodyGrad.addColorStop(0.5, '#ff6b35');
                bodyGrad.addColorStop(1, '#d84315');
                this.ctx.fillStyle = bodyGrad;
                
                // Main body
                this.ctx.beginPath();
                this.ctx.moveTo(-30, -15);
                this.ctx.lineTo(30, -15);
                this.ctx.lineTo(35, 0);
                this.ctx.lineTo(30, 15);
                this.ctx.lineTo(-30, 15);
                this.ctx.lineTo(-35, 0);
                this.ctx.closePath();
                this.ctx.fill();
                
                // Armor plating
                if(this.upgrades.armor > 1) {
                    this.ctx.strokeStyle = '#666';
                    this.ctx.lineWidth = 3;
                    this.ctx.stroke();
                    
                    if(this.upgrades.armor > 3) {
                        this.ctx.fillStyle = 'rgba(100,100,100,0.4)';
                        this.ctx.fillRect(-25, -12, 20, 24);
                    }
                }
                
                // Weapon
                if(this.upgrades.weapon > 0) {
                    this.ctx.fillStyle = '#444';
                    this.ctx.fillRect(5, -28, 25, 8);
                    this.ctx.fillStyle = '#666';
                    this.ctx.fillRect(28, -30, 8, 12);
                    // Laser sight
                    if(Math.random() > 0.7) {
                        this.ctx.strokeStyle = 'rgba(255,0,0,0.5)';
                        this.ctx.lineWidth = 2;
                        this.ctx.beginPath();
                        this.ctx.moveTo(32, -24);
                        this.ctx.lineTo(100, -24);
                        this.ctx.stroke();
                    }
                }
                
                // Wheels with detail
                this.drawWheel(-22, -18);
                this.drawWheel(-22, 18);
                this.drawWheel(18, -18);
                this.drawWheel(18, 18);
                
                // Windows
                this.ctx.fillStyle = '#87CEEB';
                this.ctx.beginPath();
                this.ctx.moveTo(-5, -12);
                this.ctx.lineTo(20, -12);
                this.ctx.lineTo(25, 0);
                this.ctx.lineTo(20, 12);
                this.ctx.lineTo(-5, 12);
                this.ctx.closePath();
                this.ctx.fill();
                
                // Window frame
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
                
                // Driver
                this.ctx.fillStyle = '#FFE4B5';
                this.ctx.beginPath();
                this.ctx.arc(5, -2, 7, 0, Math.PI * 2);
                this.ctx.fill();
                
                // Helmet
                this.ctx.fillStyle = '#333';
                this.ctx.beginPath();
                this.ctx.arc(5, -4, 8, Math.PI, 0);
                this.ctx.fill();
                
                this.ctx.restore();
            }
            
            drawWheel(x, y) {
                this.ctx.fillStyle = '#1a1a1a';
                this.ctx.beginPath();
                this.ctx.arc(x, y, 10, 0, Math.PI * 2);
                this.ctx.fill();
                
                // Rim
                this.ctx.fillStyle = '#444';
                this.ctx.beginPath();
                this.ctx.arc(x, y, 6, 0, Math.PI * 2);
                this.ctx.fill();
                
                // Spokes
                this.ctx.strokeStyle = '#666';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.moveTo(x - 4, y);
                this.ctx.lineTo(x + 4, y);
                this.ctx.moveTo(x, y - 4);
                this.ctx.lineTo(x, y + 4);
                this.ctx.stroke();
            }
            
            updateUI() {
                document.getElementById('distance').textContent = this.distance;
                document.getElementById('speed').textContent = Math.floor(Math.abs(this.car.vx) * 5);
                document.getElementById('cash').textContent = this.cash;
                
                const fuelPercent = Math.max(0, (this.car.fuel / this.car.maxFuel) * 100);
                document.getElementById('fuelFill').style.width = fuelPercent + '%';
                
                // Color change for low fuel
                const fuelFill = document.getElementById('fuelFill');
                if(fuelPercent < 20) {
                    fuelFill.style.background = '#ff0000';
                    fuelFill.style.boxShadow = '0 0 10px #ff0000';
                } else {
                    fuelFill.style.background = 'linear-gradient(90deg, #ff0000 0%, #ffff00 50%, #00ff00 100%)';
                    fuelFill.style.boxShadow = '0 0 10px rgba(0,255,0,0.5)';
                }
                
                // Update markers
                document.querySelectorAll('.marker').forEach(marker => {
                    const dist = parseInt(marker.dataset.dist);
                    if(this.distance >= dist && !marker.classList.contains('reached')) {
                        marker.classList.add('reached');
                    }
                });
            }
            
            gameOver() {
                this.totalCash += this.cash;
                document.getElementById('finalDistance').textContent = this.distance + ' м';
                document.getElementById('finalCash').textContent = '$' + this.cash;
                document.getElementById('gameOver').classList.remove('hidden');
            }
            
            openShop() {
                document.getElementById('gameOver').classList.add('hidden');
                document.getElementById('shop').classList.remove('hidden');
                this.updateShop();
            }
            
            updateShop() {
                document.getElementById('shopMoney').textContent = this.totalCash;
                
                Object.keys(this.upgrades).forEach(key => {
                    const level = this.upgrades[key];
                    const maxLevel = key === 'weapon' ? 3 : 5;
                    const cost = this.costs[key];
                    const canAfford = this.totalCash >= cost;
                    const isMaxed = level >= maxLevel;
                    
                    const item = document.getElementById(`upgrade-${key}`);
                    const levelSpan = document.getElementById(`level-${key}`);
                    const costDiv = document.getElementById(`cost-${key}`);
                    
                    levelSpan.textContent = level;
                    
                    if(isMaxed) {
                        item.classList.add('maxed');
                        item.classList.remove('disabled');
                        costDiv.textContent = 'МАКСИМУМ';
                        costDiv.style.color = '#ffd700';
                    } else {
                        item.classList.remove('maxed');
                        costDiv.textContent = '$' + cost;
                        
                        if(!canAfford) {
                            item.classList.add('disabled');
                            costDiv.style.color = '#ff4444';
                        } else {
                            item.classList.remove('disabled');
                            costDiv.style.color = '#ffd700';
                        }
                    }
                });
            }
            
            buyUpgrade(type) {
                const level = this.upgrades[type];
                const maxLevel = type === 'weapon' ? 3 : 5;
                
                if(level >= maxLevel) return;
                
                const cost = this.costs[type];
                if(this.totalCash >= cost) {
                    this.totalCash -= cost;
                    this.upgrades[type]++;
                    this.costs[type] = Math.floor(cost * 1.4);
                    
                    // Visual feedback
                    const item = document.getElementById(`upgrade-${type}`);
                    item.style.transform = 'scale(0.95)';
                    setTimeout(() => item.style.transform = '', 100);
                    
                    this.updateShop();
                }
            }
            
            nextLevel() {
                this.level++;
                this.cash = 0;
                document.getElementById('shop').classList.add('hidden');
                this.resetLevel();
            }
            
            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }
        
        // Initialize game when page loads
        let game;
        window.onload = () => {
            game = new Game();
        };
    </script>
</body>
</html>
